name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install -U platformio
      - name: Build firmware
        run: pio run
      - name: Run tests
        run: pio test -e esp32dev_test
