<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 1280px;
    height: 640px;
  }
</style>
</head>
<body>
  <svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Gradiente per il corpo del cilindro: luce forte in alto, sfuma a zero verso il basso -->
      <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
        <stop offset="8%" stop-color="white" stop-opacity="0.12"/>
        <stop offset="20%" stop-color="white" stop-opacity="0.03"/>
        <stop offset="50%" stop-color="white" stop-opacity="0.0"/>
        <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
      </linearGradient>
      
      <!-- Lucidità nera riflessa (riflesso orizzontale appena percettibile) -->
      <linearGradient id="glossGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
        <stop offset="25%" stop-color="white" stop-opacity="0.18"/>
        <stop offset="40%" stop-color="white" stop-opacity="0.06"/>
        <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
      </linearGradient>

      <!-- Maschera per ritagliare il logo nell'ellisse superiore -->
      <clipPath id="topClip">
        <ellipse cx="640" cy="160" rx="200" ry="90"/>
      </clipPath>
    </defs>

    <!-- Corpo del cilindro -->
    <path d="M440,160 L440,480 A200,90 0 0,0 840,480 L840,160 A200,90 0 0,1 440,160 Z"
          fill="url(#bodyGrad)" stroke="white" stroke-width="1.2" stroke-opacity="0.4"/>
    
    <!-- Riflesso lucido orizzontale sul corpo -->
    <path d="M440,160 L440,480 A200,90 0 0,0 840,480 L840,160 A200,90 0 0,1 440,160 Z"
          fill="url(#glossGrad)" />

    <!-- Ellisse inferiore (bordo posteriore, contorno sottile) -->
    <ellipse cx="640" cy="480" rx="200" ry="90" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.2"/>

    <!-- Logo sulla faccia superiore (ritagliato) -->
    <g clip-path="url(#topClip)">
      <image href="docs/demo/tap_tune_logo.png" x="440" y="70" width="400" height="180" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <!-- Bordo della faccia superiore -->
    <ellipse cx="640" cy="160" rx="200" ry="90" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9"/>

    <!-- Leggero bagliore sul bordo superiore -->
    <ellipse cx="640" cy="160" rx="200" ry="90" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.4" filter="url(#glow)"/>

    <!-- Filtro bagliore -->
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- Tagline posizionata sul cilindro, nella metà inferiore -->
    <text x="640" y="400" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="300" letter-spacing="6" opacity="0.85">
      Tap your phone.
    </text>
    <text x="640" y="450" text-anchor="middle" fill="white" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="300" letter-spacing="6" opacity="0.85">
      Start the music.
    </text>
  </svg>
</body>
</html>
